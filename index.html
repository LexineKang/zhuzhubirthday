<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生日快乐电子贺卡</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: linear-gradient(to bottom, #dff6ff 0%, #f6ffea 45%, #d8f7c7 100%);
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 12px 30px;
    }

    .card {
      position: relative;
      width: min(920px, 100%);
      min-height: 1320px;
      border-radius: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,0.75), transparent 18%),
        radial-gradient(circle at 80% 18%, rgba(255,255,255,0.65), transparent 14%),
        linear-gradient(to bottom, #dff6ff 0%, #eefce7 55%, #d3f2bc 100%);
      border: 4px solid #ffffff;
      box-shadow: 0 18px 40px rgba(58, 118, 66, 0.18);
    }

    .sky {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.9);
      border-radius: 999px;
      filter: blur(0.2px);
      animation: floatCloud linear infinite;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.95);
      border-radius: 50%;
    }

    .cloud1 {
      width: 120px;
      height: 42px;
      top: 70px;
      left: -20px;
      animation-duration: 22s;
    }
    .cloud1::before {
      width: 44px;
      height: 44px;
      left: 16px;
      top: -18px;
    }
    .cloud1::after {
      width: 58px;
      height: 58px;
      left: 48px;
      top: -26px;
    }

    .cloud2 {
      width: 150px;
      height: 48px;
      top: 150px;
      right: -20px;
      animation-duration: 28s;
      animation-direction: reverse;
    }
    .cloud2::before {
      width: 50px;
      height: 50px;
      left: 20px;
      top: -18px;
    }
    .cloud2::after {
      width: 66px;
      height: 66px;
      left: 62px;
      top: -28px;
    }

    @keyframes floatCloud {
      0% { transform: translateX(0); }
      50% { transform: translateX(20px); }
      100% { transform: translateX(0); }
    }

    .title-wrap {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 38px 20px 6px;
    }

    .title {
      margin: 0;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 800;
      color: #ff6fa6;
      letter-spacing: 2px;
      text-shadow:
        0 2px 0 #fff,
        0 6px 18px rgba(255, 111, 166, 0.22);
    }

    .subtitle {
      margin-top: 8px;
      font-size: clamp(14px, 2.4vw, 20px);
      color: #5d8a57;
      font-weight: 600;
    }

    .scene {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 980px;
    }

    .river {
      position: absolute;
      left: 60px;
      bottom: 190px;
      width: 210px;
      height: 110px;
      background: linear-gradient(135deg, #9fe7ff 0%, #73d4ff 50%, #baf2ff 100%);
      border: 4px solid #5ba9c7;
      border-radius: 58% 42% 64% 36% / 46% 59% 41% 54%;
      transform: rotate(-8deg);
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.38);
    }

    .river::before,
    .river::after {
      content: "";
      position: absolute;
      left: 16px;
      right: 16px;
      height: 3px;
      background: rgba(255,255,255,0.7);
      border-radius: 999px;
    }

    .river::before {
      top: 34px;
      transform: rotate(4deg);
    }

    .river::after {
      top: 64px;
      transform: rotate(-3deg);
    }

    .ground {
      position: absolute;
      left: -3%;
      width: 106%;
      bottom: 0;
      height: 300px;
      background: linear-gradient(to top, #7fd15e 0%, #99df76 45%, #b5ed90 100%);
      border-top: 4px solid #69b64b;
      border-radius: 50% 50% 0 0 / 12% 12% 0 0;
    }

    .flower {
      position: absolute;
      width: 18px;
      height: 18px;
      z-index: 2;
      animation: bob 2.6s ease-in-out infinite;
    }

    .flower::before,
    .flower::after {
      content: "";
      position: absolute;
      border-radius: 50%;
    }

    .flower .petal {
      position: absolute;
      width: 18px;
      height: 18px;
      left: 0;
      top: 0;
    }

    .flower .petal::before,
    .flower .petal::after,
    .flower .petal span::before,
    .flower .petal span::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      background: var(--c1, #ff9ec8);
      border: 2px solid #ffffff;
      border-radius: 50%;
    }

    .flower .petal::before { left: 4px; top: -2px; }
    .flower .petal::after { left: -2px; top: 4px; }
    .flower .petal span::before { left: 10px; top: 4px; }
    .flower .petal span::after { left: 4px; top: 10px; }

    .flower .center {
      position: absolute;
      width: 7px;
      height: 7px;
      left: 5.5px;
      top: 5.5px;
      background: #ffd84d;
      border-radius: 50%;
      border: 1px solid #fff;
    }

    .flower .stem {
      position: absolute;
      width: 3px;
      height: 26px;
      left: 7px;
      top: 14px;
      background: #4fae49;
      border-radius: 999px;
    }

    @keyframes bob {
      0%,100% { transform: rotate(-2deg) translateY(0); }
      50% { transform: rotate(2deg) translateY(-3px); }
    }

    .butterfly {
      position: absolute;
      width: 44px;
      height: 34px;
      z-index: 3;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
    }

    .butterfly .wing {
      position: absolute;
      width: 18px;
      height: 18px;
      background: radial-gradient(circle at 40% 40%, #fff7a8 0%, #ffc1de 48%, #ff8db2 100%);
      border: 2px solid rgba(120, 84, 118, 0.22);
      border-radius: 65% 35% 60% 40%;
      transform-origin: bottom center;
      animation: flap 0.45s ease-in-out infinite alternate;
    }

    .butterfly .wing.left.top {
      left: 2px;
      top: 2px;
      transform: rotate(-26deg);
    }
    .butterfly .wing.left.bottom {
      left: 4px;
      top: 15px;
      transform: rotate(18deg);
      width: 16px;
      height: 14px;
    }
    .butterfly .wing.right.top {
      right: 2px;
      top: 2px;
      transform: scaleX(-1) rotate(-26deg);
    }
    .butterfly .wing.right.bottom {
      right: 4px;
      top: 15px;
      transform: scaleX(-1) rotate(18deg);
      width: 16px;
      height: 14px;
    }

    .butterfly .body {
      position: absolute;
      left: 19px;
      top: 6px;
      width: 6px;
      height: 20px;
      background: #6e5a58;
      border-radius: 999px;
    }

    .butterfly.b1 {
      left: 80px;
      top: 180px;
      animation: fly1 8s infinite;
    }
    .butterfly.b2 {
      right: 90px;
      top: 230px;
      transform: scale(0.9);
      animation: fly2 10s infinite;
    }
    .butterfly.b3 {
      left: 220px;
      top: 80px;
      transform: scale(0.8);
      animation: fly3 9s infinite;
    }

    @keyframes flap {
      from { transform: rotate(-18deg); }
      to { transform: rotate(12deg); }
    }

    @keyframes fly1 {
      0%,100% { transform: translate(0,0) rotate(0deg); }
      25% { transform: translate(40px,-18px) rotate(6deg); }
      50% { transform: translate(88px,12px) rotate(-4deg); }
      75% { transform: translate(46px,28px) rotate(5deg); }
    }

    @keyframes fly2 {
      0%,100% { transform: translate(0,0) scale(0.9); }
      30% { transform: translate(-48px,-26px) scale(0.95); }
      60% { transform: translate(-90px,16px) scale(0.88); }
      80% { transform: translate(-30px,28px) scale(0.92); }
    }

    @keyframes fly3 {
      0%,100% { transform: translate(0,0) scale(0.8); }
      33% { transform: translate(34px,18px) scale(0.86); }
      66% { transform: translate(86px,-10px) scale(0.8); }
    }

    .hearts {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      opacity: 0;
      animation: heartFloat 6s linear infinite;
    }

    .heart.h1 { left: 52%; top: 520px; animation-delay: 0s; }
    .heart.h2 { left: 48%; top: 560px; animation-delay: 1.8s; }
    .heart.h3 { left: 58%; top: 540px; animation-delay: 3.1s; }

    @keyframes heartFloat {
      0% { transform: translateY(0) scale(0.9); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(-120px) translateX(22px) scale(1.15); opacity: 0; }
    }

    .message {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 10px 24px 38px;
    }

    .message p {
      margin: 0;
      font-size: clamp(22px, 4.5vw, 38px);
      font-weight: 800;
      color: #ff6b96;
      line-height: 1.5;
      letter-spacing: 1.5px;
      text-shadow: 0 2px 0 #fff8fc;
    }

    .music-btn {
      position: absolute;
      right: 18px;
      top: 18px;
      z-index: 5;
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      color: #ff5f96;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }

    .music-tip {
      position: absolute;
      top: 66px;
      right: 18px;
      z-index: 5;
      font-size: 12px;
      color: #5d8a57;
      background: rgba(255,255,255,0.78);
      padding: 6px 10px;
      border-radius: 12px;
    }

    .handdraw {
      stroke: #5e514d;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .fill-pig {
      fill: #f7c9b2;
      stroke: #5e514d;
      stroke-width: 4;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .fill-mouse {
      fill: #d9d6d2;
      stroke: #5e514d;
      stroke-width: 4;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .fill-cake {
      fill: #fff1dc;
      stroke: #5e514d;
      stroke-width: 4;
    }

    .fill-cream {
      fill: #ffd8ef;
      stroke: #5e514d;
      stroke-width: 4;
    }

    .flame {
      transform-origin: center;
      animation: flicker 0.5s ease-in-out infinite alternate;
    }

    @keyframes flicker {
      0% { transform: scale(0.92) rotate(-4deg); }
      100% { transform: scale(1.06) rotate(4deg); }
    }

    .sparkle {
      animation: sparkle 1.8s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes sparkle {
      0%,100% { opacity: 0.45; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    @media (max-width: 768px) {
      .card {
        min-height: 1180px;
      }
      .scene {
        height: 900px;
      }
      .music-tip {
        max-width: 130px;
        line-height: 1.4;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <button class="music-btn" id="musicBtn">▶ 播放音乐</button>
    <div class="music-tip">首次打开时，请点击按钮播放背景音乐</div>

    <div class="sky">
      <div class="cloud cloud1"></div>
      <div class="cloud cloud2"></div>
    </div>

    <div class="title-wrap">
      <h1 class="title">生日快乐呀 🎂</h1>
      <div class="subtitle">一张送给朋友的动态生日电子贺卡</div>
    </div>

    <div class="scene">
      <div class="river"></div>
      <div class="ground"></div>

      <div class="butterfly b1">
        <div class="wing left top"></div>
        <div class="wing left bottom"></div>
        <div class="wing right top"></div>
        <div class="wing right bottom"></div>
        <div class="body"></div>
      </div>

      <div class="butterfly b2">
        <div class="wing left top"></div>
        <div class="wing left bottom"></div>
        <div class="wing right top"></div>
        <div class="wing right bottom"></div>
        <div class="body"></div>
      </div>

      <div class="butterfly b3">
        <div class="wing left top"></div>
        <div class="wing left bottom"></div>
        <div class="wing right top"></div>
        <div class="wing right bottom"></div>
        <div class="body"></div>
      </div>

      <div class="hearts">
        <div class="heart h1">💛</div>
        <div class="heart h2">💖</div>
        <div class="heart h3">✨</div>
      </div>

      <!-- 花 -->
      <div class="flower" style="left:60px; bottom:125px; --c1:#ff9fc8;">
        <div class="petal"><span></span></div><div class="center"></div><div class="stem"></div>
      </div>
      <div class="flower" style="left:140px; bottom:110px; --c1:#ffd28d; animation-delay:0.2s;">
        <div class="petal"><span></span></div><div class="center"></div><div class="stem"></div>
      </div>
      <div class="flower" style="left:250px; bottom:140px; --c1:#c9a8ff; animation-delay:0.5s;">
        <div class="petal"><span></span></div><div class="center"></div><div class="stem"></div>
      </div>
      <div class="flower" style="right:160px; bottom:120px; --c1:#ff9fc8; animation-delay:0.1s;">
        <div class="petal"><span></span></div><div class="center"></div><div class="stem"></div>
      </div>
      <div class="flower" style="right:85px; bottom:150px; --c1:#8fe1ff; animation-delay:0.4s;">
        <div class="petal"><span></span></div><div class="center"></div><div class="stem"></div>
      </div>
      <div class="flower" style="right:250px; bottom:102px; --c1:#ffd28d; animation-delay:0.7s;">
        <div class="petal"><span></span></div><div class="center"></div><div class="stem"></div>
      </div>

      <!-- 主插画 -->
      <svg viewBox="0 0 900 950" width="100%" height="100%" style="position:absolute; left:0; top:0; z-index:2;">
        <!-- 桌子 -->
        <ellipse cx="455" cy="642" rx="170" ry="32" fill="#d6b48a" stroke="#5e514d" stroke-width="4"></ellipse>
        <rect x="295" y="642" width="320" height="28" rx="10" fill="#d7b78f" stroke="#5e514d" stroke-width="4"></rect>
        <line x1="325" y1="670" x2="310" y2="765" class="handdraw"></line>
        <line x1="585" y1="670" x2="598" y2="765" class="handdraw"></line>
        <line x1="370" y1="670" x2="360" y2="765" class="handdraw"></line>
        <line x1="540" y1="670" x2="550" y2="765" class="handdraw"></line>

        <!-- 蛋糕 -->
        <ellipse cx="455" cy="590" rx="72" ry="18" class="fill-cream"></ellipse>
        <rect x="386" y="590" width="138" height="60" rx="20" class="fill-cake"></rect>
        <path d="M393 605 C408 622, 423 590, 438 607 S469 622, 484 607 S515 622, 520 605" class="handdraw" style="stroke:#ff84b7;"></path>
        <ellipse cx="455" cy="650" rx="69" ry="14" class="fill-cake"></ellipse>
        <rect x="448" y="544" width="8" height="34" rx="4" fill="#6ec8ff" stroke="#5e514d" stroke-width="3"></rect>
        <path class="flame" d="M452 534 C439 521, 448 510, 455 499 C463 510, 470 522, 458 535 C456 537,454 537,452 534 Z" fill="#ffb648" stroke="#5e514d" stroke-width="3"></path>

        <!-- 山猪 -->
        <ellipse cx="454" cy="415" rx="112" ry="104" class="fill-pig"></ellipse>

        <!-- 耳朵 -->
        <path d="M360 330 C340 280, 385 278, 400 325 Z" class="fill-pig"></path>
        <path d="M547 325 C562 282, 608 286, 586 333 Z" class="fill-pig"></path>

        <!-- 脸 -->
        <circle cx="415" cy="395" r="7" fill="#5e514d"></circle>
        <circle cx="493" cy="395" r="7" fill="#5e514d"></circle>
        <path d="M430 430 Q454 448 478 430" class="handdraw"></path>

        <!-- 鼻子 -->
        <ellipse cx="454" cy="421" rx="34" ry="24" fill="#f2b39b" stroke="#5e514d" stroke-width="4"></ellipse>
        <ellipse cx="443" cy="421" rx="4" ry="6" fill="#5e514d"></ellipse>
        <ellipse cx="465" cy="421" rx="4" ry="6" fill="#5e514d"></ellipse>

        <!-- 小獠牙 -->
        <path d="M422 435 Q416 448 428 450" fill="#fffaf0" stroke="#5e514d" stroke-width="3"></path>
        <path d="M486 435 Q493 448 480 450" fill="#fffaf0" stroke="#5e514d" stroke-width="3"></path>

        <!-- 身体 -->
        <ellipse cx="454" cy="548" rx="120" ry="110" class="fill-pig"></ellipse>

        <!-- 前手 -->
        <path d="M395 520 Q365 548 368 590 Q387 590 405 571" class="fill-pig"></path>
        <path d="M514 520 Q543 548 540 590 Q520 590 502 571" class="fill-pig"></path>

        <!-- 坐姿脚 -->
        <ellipse cx="406" cy="634" rx="44" ry="30" class="fill-pig"></ellipse>
        <ellipse cx="502" cy="634" rx="44" ry="30" class="fill-pig"></ellipse>

        <!-- 山猪头上庆生小星星 -->
        <g class="sparkle">
          <path d="M453 255 L459 270 L475 272 L462 282 L466 298 L453 289 L440 298 L444 282 L431 272 L447 270 Z" fill="#ffd54a" stroke="#5e514d" stroke-width="3"></path>
        </g>

        <!-- 左边老鼠 -->
        <g transform="translate(230,500)">
          <ellipse cx="0" cy="55" rx="46" ry="38" class="fill-mouse"></ellipse>
          <circle cx="0" cy="22" r="28" class="fill-mouse"></circle>
          <circle cx="-16" cy="2" r="12" class="fill-mouse"></circle>
          <circle cx="16" cy="2" r="12" class="fill-mouse"></circle>
          <circle cx="-8" cy="18" r="4" fill="#5e514d"></circle>
          <circle cx="8" cy="18" r="4" fill="#5e514d"></circle>
          <circle cx="0" cy="28" r="5" fill="#f7a8b7" stroke="#5e514d" stroke-width="2"></circle>
          <path d="M-10 39 Q0 46 10 39" class="handdraw" style="stroke-width:3"></path>
          <path d="M-44 52 Q-60 45 -70 34" class="handdraw" style="stroke-width:3"></path>
          <path d="M44 52 Q60 45 70 34" class="handdraw" style="stroke-width:3"></path>
          <path d="M-45 63 Q-75 44 -96 52 Q-110 60 -108 73 Q-106 87 -87 88" class="handdraw" style="stroke-width:3"></path>
          <path d="M-25 86 Q-10 98 4 90" class="handdraw"></path>
          <path d="M18 84 Q30 96 42 88" class="handdraw"></path>
          <path d="M-22 66 Q8 48 32 57" class="handdraw" style="stroke:#ff9fbc; stroke-width:4"></path>
        </g>

        <!-- 右边老鼠 -->
        <g transform="translate(674,512)">
          <ellipse cx="0" cy="55" rx="46" ry="38" class="fill-mouse"></ellipse>
          <circle cx="0" cy="22" r="28" class="fill-mouse"></circle>
          <circle cx="-16" cy="2" r="12" class="fill-mouse"></circle>
          <circle cx="16" cy="2" r="12" class="fill-mouse"></circle>
          <circle cx="-8" cy="18" r="4" fill="#5e514d"></circle>
          <circle cx="8" cy="18" r="4" fill="#5e514d"></circle>
          <circle cx="0" cy="28" r="5" fill="#f7a8b7" stroke="#5e514d" stroke-width="2"></circle>
          <path d="M-10 39 Q0 46 10 39" class="handdraw" style="stroke-width:3"></path>
          <path d="M-44 52 Q-60 45 -70 34" class="handdraw" style="stroke-width:3"></path>
          <path d="M44 52 Q60 45 70 34" class="handdraw" style="stroke-width:3"></path>
          <path d="M45 63 Q75 44 96 52 Q110 60 108 73 Q106 87 87 88" class="handdraw" style="stroke-width:3"></path>
          <path d="M-42 88 Q-30 96 -18 84" class="handdraw"></path>
          <path d="M-4 90 Q10 98 25 84" class="handdraw"></path>
          <path d="M-30 60 Q0 40 30 60" class="handdraw" style="stroke:#ffd15c; stroke-width:4"></path>
        </g>

        <!-- 围观欢呼小装饰 -->
        <g class="sparkle">
          <path d="M185 460 L190 472 L203 474 L193 483 L196 496 L185 489 L174 496 L177 483 L167 474 L180 472 Z" fill="#ffe27a" stroke="#5e514d" stroke-width="2"></path>
          <path d="M715 440 L720 452 L733 454 L723 463 L726 476 L715 469 L704 476 L707 463 L697 454 L710 452 Z" fill="#ffe27a" stroke="#5e514d" stroke-width="2"></path>
        </g>
      </svg>
    </div>

    <div class="message">
      <p>祝福猪猪生日，天天开心。</p>
    </div>

    <!-- 背景音乐：请把你的伴奏文件命名为 birthday-music.mp3 并上传到同一仓库 -->
    <audio id="bgm" loop>
      <source src="birthday-music.mp3" type="audio/mpeg">
    </audio>
  </div>

  <script>
    const musicBtn = document.getElementById("musicBtn");
    const bgm = document.getElementById("bgm");
    let isPlaying = false;

    musicBtn.addEventListener("click", async () => {
      try {
        if (!isPlaying) {
          await bgm.play();
          isPlaying = true;
          musicBtn.textContent = "⏸ 暂停音乐";
        } else {
          bgm.pause();
          isPlaying = false;
          musicBtn.textContent = "▶ 播放音乐";
        }
      } catch (e) {
        alert("音乐还没有上传成功。请把背景音乐文件命名为 birthday-music.mp3，并和 index.html 放在同一个仓库里。");
      }
    });
  </script>
</body>
</html>
