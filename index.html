<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>祝猪猪生日快乐</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background:
        radial-gradient(circle at 20% 12%, rgba(255, 242, 197, 0.45), transparent 18%),
        radial-gradient(circle at 78% 20%, rgba(255, 205, 229, 0.35), transparent 20%),
        linear-gradient(180deg, #dff6ff 0%, #fff3e1 42%, #d7f4bf 100%);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 10px 28px;
    }

    .page {
      position: relative;
      width: min(96vw, 620px);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card-wrap {
      position: relative;
      width: 100%;
      animation: cardFloat 4.5s ease-in-out infinite;
      z-index: 2;
    }

    .card-frame {
      position: relative;
      width: 100%;
      padding: 10px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.75);
      box-shadow:
        0 18px 45px rgba(97, 130, 80, 0.25),
        0 0 0 1px rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
    }

    .card-img {
      display: block;
      width: 100%;
      border-radius: 22px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.6),
        0 8px 22px rgba(82, 105, 70, 0.18);
    }

    @keyframes cardFloat {
      0%, 100% {
        transform: translateY(0) rotate(-0.15deg);
      }
      50% {
        transform: translateY(-8px) rotate(0.15deg);
      }
    }

    .glow {
      position: absolute;
      inset: 4%;
      border-radius: 32px;
      pointer-events: none;
      background:
        radial-gradient(circle at 52% 48%, rgba(255, 231, 145, 0.18), transparent 18%),
        radial-gradient(circle at 40% 72%, rgba(255, 146, 197, 0.12), transparent 20%);
      animation: glowPulse 2.8s ease-in-out infinite;
      z-index: 3;
      mix-blend-mode: screen;
    }

    @keyframes glowPulse {
      0%, 100% {
        opacity: 0.45;
      }
      50% {
        opacity: 0.9;
      }
    }

    .sparkle-layer,
    .petal-layer,
    .butterfly-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .sparkle-layer {
      z-index: 4;
    }

    .petal-layer {
      z-index: 1;
    }

    .butterfly-layer {
      z-index: 5;
    }

    .sparkle {
      position: absolute;
      color: #fff3a8;
      text-shadow: 0 0 8px rgba(255, 224, 95, 0.9);
      opacity: 0;
      animation: sparkleBlink 2.4s ease-in-out infinite;
    }

    .sparkle.s1 { left: 14%; top: 18%; font-size: 18px; animation-delay: 0s; }
    .sparkle.s2 { left: 82%; top: 24%; font-size: 14px; animation-delay: 0.5s; }
    .sparkle.s3 { left: 10%; top: 72%; font-size: 15px; animation-delay: 1.1s; }
    .sparkle.s4 { left: 88%; top: 68%; font-size: 20px; animation-delay: 1.6s; }
    .sparkle.s5 { left: 50%; top: 8%; font-size: 13px; animation-delay: 0.9s; }

    @keyframes sparkleBlink {
      0%, 100% {
        opacity: 0;
        transform: scale(0.7) rotate(0deg);
      }
      45%, 60% {
        opacity: 1;
        transform: scale(1.15) rotate(12deg);
      }
    }

    .petal {
      position: absolute;
      top: -40px;
      width: 14px;
      height: 20px;
      border-radius: 70% 30% 70% 30%;
      background: rgba(255, 169, 197, 0.85);
      filter: blur(0.2px);
      animation: fall linear infinite;
    }

    .petal.p1 { left: 8%; animation-duration: 10s; animation-delay: 0s; }
    .petal.p2 { left: 22%; animation-duration: 13s; animation-delay: 2s; background: rgba(255, 220, 132, 0.85); }
    .petal.p3 { left: 42%; animation-duration: 11s; animation-delay: 1s; background: rgba(255, 182, 214, 0.82); }
    .petal.p4 { left: 66%; animation-duration: 14s; animation-delay: 4s; background: rgba(255, 235, 174, 0.85); }
    .petal.p5 { left: 84%; animation-duration: 12s; animation-delay: 3s; background: rgba(255, 160, 192, 0.8); }
    .petal.p6 { left: 95%; animation-duration: 15s; animation-delay: 6s; background: rgba(255, 211, 236, 0.8); }

    @keyframes fall {
      0% {
        transform: translateY(-40px) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) translateX(-70px) rotate(360deg);
        opacity: 0;
      }
    }

    .butterfly {
      position: absolute;
      width: 38px;
      height: 30px;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
    }

    .butterfly .wing {
      position: absolute;
      width: 17px;
      height: 18px;
      background: radial-gradient(circle at 40% 40%, #fff6a8 0%, #ffb9d5 50%, #ff8fb5 100%);
      border-radius: 70% 30% 65% 35%;
      transform-origin: bottom center;
      animation: wingFlap 0.45s ease-in-out infinite alternate;
      opacity: 0.92;
    }

    .butterfly .left {
      left: 2px;
      top: 4px;
    }

    .butterfly .right {
      right: 2px;
      top: 4px;
      transform: scaleX(-1);
    }

    .butterfly .body {
      position: absolute;
      left: 17px;
      top: 8px;
      width: 5px;
      height: 17px;
      border-radius: 999px;
      background: #7a6259;
    }

    .butterfly.b1 {
      left: 5%;
      top: 35%;
      animation-name: flyA;
      animation-duration: 8s;
    }

    .butterfly.b2 {
      right: 7%;
      top: 52%;
      transform: scale(0.85);
      animation-name: flyB;
      animation-duration: 10s;
    }

    @keyframes wingFlap {
      from {
        transform: rotate(-18deg);
      }
      to {
        transform: rotate(16deg);
      }
    }

    @keyframes flyA {
      0%, 100% {
        transform: translate(0,0) rotate(0deg);
      }
      25% {
        transform: translate(36px,-22px) rotate(8deg);
      }
      50% {
        transform: translate(70px,16px) rotate(-5deg);
      }
      75% {
        transform: translate(32px,32px) rotate(6deg);
      }
    }

    @keyframes flyB {
      0%, 100% {
        transform: translate(0,0) scale(0.85);
      }
      30% {
        transform: translate(-42px,-28px) scale(0.9);
      }
      60% {
        transform: translate(-78px,12px) scale(0.86);
      }
      80% {
        transform: translate(-25px,28px) scale(0.9);
      }
    }

    .music-btn {
      position: fixed;
      right: 14px;
      top: 14px;
      z-index: 10;
      border: none;
      border-radius: 999px;
      padding: 9px 13px;
      background: rgba(255, 255, 255, 0.9);
      color: #d86b8c;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 6px 18px rgba(0,0,0,0.14);
      cursor: pointer;
    }

    .music-note {
      position: fixed;
      right: 18px;
      top: 58px;
      z-index: 10;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,0.7);
      color: #6d9b65;
      font-size: 11px;
    }

    @media (max-width: 480px) {
      body {
        padding: 12px 8px 22px;
      }

      .page {
        width: 98vw;
        align-items: flex-start;
        padding-top: 64px;
      }

      .card-frame {
        padding: 7px;
        border-radius: 22px;
      }

      .card-img {
        border-radius: 17px;
      }

      .music-note {
        max-width: 160px;
        line-height: 1.4;
      }
    }
  </style>
</head>

<body>
  <button class="music-btn" id="musicBtn">▶ 播放音乐</button>
  <div class="music-note">点击播放生日快乐伴奏</div>

  <div class="petal-layer">
    <div class="petal p1"></div>
    <div class="petal p2"></div>
    <div class="petal p3"></div>
    <div class="petal p4"></div>
    <div class="petal p5"></div>
    <div class="petal p6"></div>
  </div>

  <div class="sparkle-layer">
    <div class="sparkle s1">✦</div>
    <div class="sparkle s2">✧</div>
    <div class="sparkle s3">✦</div>
    <div class="sparkle s4">✧</div>
    <div class="sparkle s5">✦</div>
  </div>

  <div class="butterfly-layer">
    <div class="butterfly b1">
      <div class="wing left"></div>
      <div class="wing right"></div>
      <div class="body"></div>
    </div>

    <div class="butterfly b2">
      <div class="wing left"></div>
      <div class="wing right"></div>
      <div class="body"></div>
    </div>
  </div>

  <main class="page">
    <div class="card-wrap">
      <div class="card-frame">
        <img class="card-img" src="birthday-card.png" alt="祝猪猪生日快乐，天天开心！">
        <div class="glow"></div>
      </div>
    </div>
  </main>

  <audio id="bgm" loop>
    <source src="birthday-music.mp3" type="audio/mpeg">
  </audio>

  <script>
    const musicBtn = document.getElementById("musicBtn");
    const bgm = document.getElementById("bgm");
    let isPlaying = false;

    musicBtn.addEventListener("click", async () => {
      try {
        if (!isPlaying) {
          await bgm.play();
          isPlaying = true;
          musicBtn.textContent = "⏸ 暂停音乐";
        } else {
          bgm.pause();
          isPlaying = false;
          musicBtn.textContent = "▶ 播放音乐";
        }
      } catch (error) {
        alert("音乐文件还没有上传成功。请把伴奏文件命名为 birthday-music.mp3，并和 index.html 放在同一个仓库里。");
      }
    });
  </script>
</body>
</html>
